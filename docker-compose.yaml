services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: P@ssw0rd
      POSTGRES_DB: main
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    shm_size: 128mb

  backend:
    image: valentine1907/ceres-api:latest
    pull_policy: always
    container_name: ceres-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_TYPE: postgresql
      POSTGRES_SERVER: db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: P@ssw0rd
      POSTGRES_DB: main
      POSTGRES_PORT: 5432
      RUN_DB_MIGRATIONS: "true"
      ENABLE_METRICS: "true"

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: ceres-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus

  grafana:
    image: grafana/grafana:10.4.2
    container_name: ceres-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    configs:
      - source: grafana_datasource
        target: /etc/grafana/provisioning/datasources/datasource.yml
      - source: grafana_dashboards_provider
        target: /etc/grafana/provisioning/dashboards/dashboards.yml
      - source: grafana_dashboard_ceres
        target: /etc/grafana/provisioning/dashboards/json/ceres-api.json
    depends_on:
      - prometheus

configs:
  prometheus_config:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s
      scrape_configs:
        - job_name: ceres-api
          metrics_path: /metrics
          static_configs:
            - targets: ["backend:8000"]

  grafana_datasource:
    content: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          uid: prometheus
          type: prometheus
          access: proxy
          url: http://prometheus:9090
          isDefault: true
          editable: false

  grafana_dashboards_provider:
    content: |
      apiVersion: 1
      providers:
        - name: CERES
          orgId: 1
          folder: CERES
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /etc/grafana/provisioning/dashboards/json

  grafana_dashboard_ceres:
    content: |
      {
        "title": "CERES API",
        "uid": "ceres-api",
        "tags": ["ceres", "fastapi"],
        "timezone": "browser",
        "schemaVersion": 39,
        "version": 1,
        "refresh": "10s",
        "time": { "from": "now-1h", "to": "now" },
        "panels": [
          {
            "id": 1,
            "title": "HTTP RPS by handler",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "targets": [
              {
                "expr": "sum(rate(http_requests_total[5m])) by (handler)",
                "legendFormat": "{{handler}}",
                "refId": "A"
              }
            ]
          },
          {
            "id": 2,
            "title": "Latency p95",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "fieldConfig": { "defaults": { "unit": "s" } },
            "targets": [
              {
                "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, handler))",
                "legendFormat": "p95 {{handler}}",
                "refId": "A"
              }
            ]
          },
          {
            "id": 3,
            "title": "HTTP RPS by status",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "targets": [
              {
                "expr": "sum(rate(http_requests_total[5m])) by (status)",
                "legendFormat": "status {{status}}",
                "refId": "A"
              }
            ]
          }
        ]
      }

volumes:
  prometheus_data:
  grafana_data:
